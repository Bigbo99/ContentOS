; ContentOS WordPress PHP 配置
; 优化文件上传和内存限制

; 文件上传限制
file_uploads = On
upload_max_filesize = 64M
post_max_size = 64M
max_file_uploads = 20

; 内存限制
memory_limit = 256M

; 执行时间限制
max_execution_time = 300
max_input_time = 300

; 会话配置
session.gc_maxlifetime = 3600

; 错误处理
display_errors = Off
log_errors = On
error_log = /var/log/php_errors.log
